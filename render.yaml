services:
  - type: web
    name: stockflow-pos
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
    runtime: node

databases:
  - name: stockflow-db
    databaseName: stock_gxpq
    user: moselyzm
